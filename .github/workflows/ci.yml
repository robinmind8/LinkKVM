name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build

  check-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev libudev-dev
      - name: Check formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml -- --check
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml -- -D warnings
      - name: Build
        run: cargo build --manifest-path src-tauri/Cargo.toml

  build:
    needs: [check-frontend, check-rust]
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            label: linux
          - os: macos-latest
            label: macos
          - os: windows-latest
            label: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf libssl-dev libgtk-3-dev libudev-dev
      - run: npm ci
      - run: npx tauri build
      - name: Get version
        id: version
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"
      - name: Find and rename artifacts (Linux)
        if: matrix.label == 'linux'
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/deb/*.deb "dist/LinkKVM-${{ steps.version.outputs.version }}.deb"
      - name: Find and rename artifacts (macOS)
        if: matrix.label == 'macos'
        run: |
          mkdir -p dist
          cp src-tauri/target/release/bundle/dmg/*.dmg "dist/LinkKVM-${{ steps.version.outputs.version }}.dmg"
      - name: Find and rename artifacts (Windows)
        if: matrix.label == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item (Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe).FullName "dist/LinkKVM-${{ steps.version.outputs.version }}.exe"
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LinkKVM-${{ matrix.label }}
          path: dist/*

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/LinkKVM-linux/*.deb
            artifacts/LinkKVM-macos/*.dmg
            artifacts/LinkKVM-windows/*.exe
